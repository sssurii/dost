[PHP]
; Uploads
post_max_size       = 100M
upload_max_filesize = 100M

; Memory
memory_limit = 256M

; Variable order (Environment, GET, POST, Cookie, Server)
variables_order = EGPCS

; Timezone
date.timezone = UTC

; Error reporting (dev-friendly)
display_errors       = On
display_startup_errors = On
log_errors           = On
error_reporting      = E_ALL

