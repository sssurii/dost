# docker-compose.yml — Dost development environment
# Network: 15.15.0.0/16 (static IPs for all containers)
#
# Services:
#   app       dost-app       15.15.0.2  — PHP 8.4-FPM + Apache (main app)
#   postgres  dost-postgres  15.15.0.3  — PostgreSQL 16
#   reverb    dost-reverb    15.15.0.4  — Laravel Reverb WebSocket server
#   valkey    dost-valkey    15.15.0.5  — Redis-compatible cache/queue (Valkey 8)

name: dost

services:

  # ── Application (PHP-FPM 8.4 + Apache 2.4) ──────────────────────────────────
  app:
    build:
      context: ./docker/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: "${WWWGROUP:-1000}"
    image: dost-app
    container_name: dost-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
      - "${NATIVE_JUMP_PORT:-3000}:3000"
    environment:
      WWWUSER: "${WWWUSER:-1000}"
      XDEBUG_MODE: "${SAIL_XDEBUG_MODE:-off}"
      XDEBUG_CONFIG: "${SAIL_XDEBUG_CONFIG:-client_host=host-gateway}"
    volumes:
      - ".:/var/www/html"
    networks:
      app-network:
        ipv4_address: 15.15.0.2
    depends_on:
      postgres:
        condition: service_healthy

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dost-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB:       "${DB_DATABASE:-dost}"
      POSTGRES_USER:     "${DB_USERNAME:-dost_user}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - dost-postgres:/var/lib/postgresql/data
      - ./docker/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql
    networks:
      app-network:
        ipv4_address: 15.15.0.3
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE:-dost}", "-U", "${DB_USERNAME:-dost_user}"]
      interval: 5s
      retries: 5
      timeout: 5s

  # ── Laravel Reverb (WebSocket server) ────────────────────────────────────────
  # Reuses the dost-app image; runs reverb:start instead of Apache
  reverb:
    image: dost-app
    container_name: dost-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --debug
    ports:
      - "${REVERB_PORT:-8080}:8080"
    environment:
      WWWUSER: "${WWWUSER:-1000}"
      APP_KEY:            "${APP_KEY}"
      REVERB_APP_ID:      "${REVERB_APP_ID:-dost}"
      REVERB_APP_KEY:     "${REVERB_APP_KEY:-dost-key}"
      REVERB_APP_SECRET:  "${REVERB_APP_SECRET:-dost-secret}"
    volumes:
      - ".:/var/www/html"
    networks:
      app-network:
        ipv4_address: 15.15.0.4
    depends_on:
      - app

  # ── Valkey 8 (Redis-compatible open-source cache/queue) ──────────────────────
  # Linux Foundation Redis fork; BSD-3-Clause; 100% Redis API-compatible.
  valkey:
    image: valkey/valkey:8-alpine
    container_name: dost-valkey
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - dost-valkey:/data
    networks:
      app-network:
        ipv4_address: 15.15.0.5
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      retries: 3
      timeout: 5s

# ── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  dost-postgres:
    driver: local
  dost-valkey:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 15.15.0.0/16
          gateway: 15.15.0.1

